services:
  # The Application
  app:
    build:
      context: ./
      dockerfile: ./docker/app.dockerfile
    working_dir: /var/www
    volumes:
      - ./:/var/www
    environment:
      DB_PORT: 3306
      DB_HOST: database
      XDEBUG_CONFIG: remote_host=host.docker.internal

  # The Web Server
  web:
    build:
      context: ./
      dockerfile: ./docker/web.dockerfile
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - 8080:80

  #mailpit
  mailpit:
    image: axllent/mailpit:v1.22
    ports:
      - 1025:1025
      - 8025:8025

  #redis
  redis:
    image: redis:8-alpine

  # The Database
  database:
    image: mysql:8.0.29
    command: ["--default-authentication-plugin=mysql_native_password"]
    volumes:
      - dbdata:/var/lib/mysql
    environment:
      - "MYSQL_DATABASE=klosterke"
      - "MYSQL_USER=klosterke"
      - "MYSQL_PASSWORD=secret"
      - "MYSQL_ROOT_PASSWORD=secret"
    ports:
      - "33061:3306"

volumes:
  dbdata:
